<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Business Map — Eircode Locator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0f1923;
      --paper:  #f7f4ef;
      --accent: #c8522a;
      --muted:  #8a8276;
      --border: #ddd8cf;
      --panel:  #ffffff;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(15,25,35,0.09);
    }

    html, body { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--ink);
      color: var(--paper);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    header svg { flex-shrink: 0; }
    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem;
      font-weight: 400;
      letter-spacing: 0.01em;
    }
    header span {
      margin-left: auto;
      font-size: 0.78rem;
      color: rgba(247,244,239,0.5);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      width: 340px;
      min-width: 300px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .section {
      padding: 22px 24px;
      border-bottom: 1px solid var(--border);
    }
    .section:last-child { border-bottom: none; }

    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.86rem;
      color: var(--ink);
      background: var(--paper);
      transition: border-color 0.18s;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--accent); }

    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 22px 14px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.over {
      border-color: var(--accent);
      background: #fff6f3;
    }
    .upload-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      width: 100%; height: 100%;
    }
    .upload-zone p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
    .upload-zone strong { color: var(--accent); }
    #file-name {
      font-size: 0.78rem; color: var(--accent); margin-top: 8px;
      font-weight: 500; word-break: break-all;
    }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .btn {
      width: 100%;
      padding: 11px 0;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.18s, transform 0.1s;
    }
    .btn:hover { background: #b04522; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    /* Progress */
    #progress-wrap { display: none; }
    #progress-bar-outer {
      background: var(--border);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
      margin-top: 12px;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
      transition: width 0.3s;
      border-radius: 99px;
    }
    #progress-text {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 7px;
    }

    /* Business list */
    #business-list { flex: 1; overflow-y: auto; }
    .biz-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      font-size: 0.82rem;
    }
    .biz-item:hover { background: #fff6f3; }
    .biz-item.active { background: #fff0eb; }
    .biz-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent); flex-shrink: 0; margin-top: 4px;
    }
    .biz-dot.err { background: var(--muted); }
    .biz-name { font-weight: 500; color: var(--ink); }
    .biz-code { color: var(--muted); font-size: 0.76rem; }

    /* ── Map ── */
    #map-wrap {
      flex: 1;
      position: relative;
      background: #e5e0d8;
    }
    #map { width: 100%; height: 100%; }

    /* Empty state */
    #empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--muted);
      pointer-events: none;
    }
    #empty-state svg { opacity: 0.25; }
    #empty-state p { font-size: 0.9rem; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--ink);
      color: var(--paper);
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 0.84rem;
      max-width: 320px;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 9999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.error { background: #a33; }

    /* Stats bar */
    #stats {
      display: none;
      padding: 10px 20px;
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
      gap: 18px;
    }
    #stats span { color: var(--ink); font-weight: 600; }

    /* Responsive */
    @media (max-width: 700px) {
      .layout { flex-direction: column; }
      aside { width: 100%; min-width: unset; max-height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
      #map-wrap { min-height: 55vh; }
    }
  </style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <circle cx="14" cy="12" r="7" stroke="#c8522a" stroke-width="2.2"/>
    <circle cx="14" cy="12" r="2.5" fill="#c8522a"/>
    <path d="M14 19c0 0-7 5-7 0" stroke="rgba(247,244,239,0.3)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="14" y1="19" x2="14" y2="26" stroke="rgba(247,244,239,0.4)" stroke-width="2" stroke-linecap="round"/>
  </svg>
  <h1>Business Map</h1>
  <span>Eircode Locator</span>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside>

    <!-- API Key -->
    <div class="section">
      <div class="section-label">Configuration</div>
      <label for="api-key">Google Maps API Key</label>
      <input type="password" id="api-key" placeholder="AIza..." autocomplete="off"/>
    </div>

    <!-- CSV Upload -->
    <div class="section">
      <div class="section-label">Data Source</div>
      <div class="upload-zone" id="drop-zone">
        <input type="file" id="csv-file" accept=".csv,.tsv,.txt" />
        <p>📂 <strong>Click to upload</strong> or drag & drop<br/>CSV file with your businesses</p>
        <div id="file-name"></div>
      </div>
    </div>

    <!-- Column mapping -->
    <div class="section" id="mapping-section" style="display:none">
      <div class="section-label">Column Mapping</div>
      <div class="row-2">
        <div>
          <label for="col-eircode">Eircode column *</label>
          <select id="col-eircode"></select>
        </div>
        <div>
          <label for="col-name">Name column</label>
          <select id="col-name"></select>
        </div>
      </div>
      <div style="margin-top:12px">
        <label for="col-extra">Extra info column (optional)</label>
        <select id="col-extra"></select>
      </div>
    </div>

    <!-- Run -->
    <div class="section">
      <button class="btn" id="run-btn" disabled>Plot Businesses on Map</button>
      <div id="progress-wrap">
        <div id="progress-bar-outer"><div id="progress-bar"></div></div>
        <div id="progress-text"></div>
      </div>
    </div>

    <!-- Stats -->
    <div id="stats">
      <span id="stat-ok">0</span> mapped &nbsp;·&nbsp;
      <span id="stat-fail">0</span> failed
    </div>

    <!-- Results list -->
    <div id="business-list"></div>

  </aside>

  <!-- Map -->
  <div id="map-wrap">
    <div id="empty-state">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <circle cx="36" cy="30" r="16" stroke="#0f1923" stroke-width="3"/>
        <circle cx="36" cy="30" r="5" fill="#0f1923"/>
        <line x1="36" y1="46" x2="36" y2="62" stroke="#0f1923" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <p>Upload your CSV and click <strong>Plot Businesses</strong></p>
    </div>
    <div id="map"></div>
  </div>

</div>

<div id="toast"></div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let csvRows = [];
let csvHeaders = [];
let map = null;
let markers = [];
let infoWindows = [];
let mapLoaded = false;
let geocoder = null;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const apiKeyInput   = document.getElementById('api-key');
const csvFileInput  = document.getElementById('csv-file');
const dropZone      = document.getElementById('drop-zone');
const fileNameEl    = document.getElementById('file-name');
const mappingSection= document.getElementById('mapping-section');
const colEircode    = document.getElementById('col-eircode');
const colName       = document.getElementById('col-name');
const colExtra      = document.getElementById('col-extra');
const runBtn        = document.getElementById('run-btn');
const progressWrap  = document.getElementById('progress-wrap');
const progressBar   = document.getElementById('progress-bar');
const progressText  = document.getElementById('progress-text');
const bizList       = document.getElementById('business-list');
const statsEl       = document.getElementById('stats');
const statOk        = document.getElementById('stat-ok');
const statFail      = document.getElementById('stat-fail');
const emptyState    = document.getElementById('empty-state');

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type === 'error' ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 3200);
}

// ── CSV Parsing ───────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { headers: [], rows: [] };
  const sep = text.includes('\t') ? '\t' : ',';
  const parseRow = line => {
    const cells = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === sep && !inQ) { cells.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cells.push(cur.trim());
    return cells;
  };
  const headers = parseRow(lines[0]);
  const rows = lines.slice(1).filter(l => l.trim()).map(l => {
    const vals = parseRow(l);
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] ?? '');
    return obj;
  });
  return { headers, rows };
}

function loadCSV(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const { headers, rows } = parseCSV(e.target.result);
    if (!headers.length) { toast('Could not parse CSV — check the file format.', 'error'); return; }
    csvHeaders = headers;
    csvRows = rows;
    fileNameEl.textContent = `✓ ${file.name}  (${rows.length} rows)`;
    populateSelects(headers);
    mappingSection.style.display = '';
    checkRunnable();
    toast(`Loaded ${rows.length} businesses`);
  };
  reader.readAsText(file);
}

function populateSelects(headers) {
  [colEircode, colName, colExtra].forEach(sel => {
    sel.innerHTML = '';
  });
  // None option for optional cols
  [colName, colExtra].forEach(sel => {
    const opt = document.createElement('option');
    opt.value = ''; opt.textContent = '— none —';
    sel.appendChild(opt);
  });
  headers.forEach(h => {
    [colEircode, colName, colExtra].forEach(sel => {
      const opt = document.createElement('option');
      opt.value = h; opt.textContent = h;
      sel.appendChild(opt);
    });
  });
  // Auto-detect Eircode column
  const eircodeGuess = headers.find(h => /eircode|postcode|post.?code|eir/i.test(h));
  if (eircodeGuess) colEircode.value = eircodeGuess;
  const nameGuess = headers.find(h => /name|business|company|title/i.test(h));
  if (nameGuess) colName.value = nameGuess;
}

// ── Drag & drop ───────────────────────────────────────────────────────────────
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) loadCSV(f);
});
csvFileInput.addEventListener('change', e => { if (e.target.files[0]) loadCSV(e.target.files[0]); });

// ── Enable run button ─────────────────────────────────────────────────────────
function checkRunnable() {
  runBtn.disabled = !(apiKeyInput.value.trim() && csvRows.length && colEircode.value);
}
apiKeyInput.addEventListener('input', checkRunnable);
colEircode.addEventListener('change', checkRunnable);

// ── Load Google Maps ──────────────────────────────────────────────────────────
function loadGoogleMaps(apiKey) {
  return new Promise((resolve, reject) => {
    if (mapLoaded) { resolve(); return; }

    let settled = false;
    function settle(fn, arg) {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      fn(arg);
    }

    // Google calls this when the key is invalid / billing not enabled
    window.gm_authFailure = () => {
      settle(reject, new Error(
        'Google Maps authentication failed. Please check:\n' +
        '• Your API key is correct\n' +
        '• Maps JavaScript API is enabled in Google Cloud Console\n' +
        '• Billing is enabled on your Google Cloud project\n' +
        '• No HTTP referrer restrictions blocking file:// or localhost'
      ));
    };

    window.__gmInit = () => { mapLoaded = true; settle(resolve); };

    const script = document.createElement('script');
    // crossorigin="anonymous" lets the browser surface real error messages
    // instead of the opaque "Script error."
    script.crossOrigin = 'anonymous';
    script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=__gmInit`;
    script.onerror = () => settle(reject, new Error(
      'Could not load the Google Maps script. Possible causes:\n' +
      '• No internet connection\n' +
      '• API key is invalid or missing\n' +
      '• A browser extension (e.g. ad-blocker) is blocking maps.googleapis.com'
    ));

    // Timeout safety net — if neither callback nor onerror fires in 10 s
    const timer = setTimeout(() => settle(reject, new Error(
      'Google Maps timed out loading. Check your internet connection and API key.'
    )), 10000);

    document.head.appendChild(script);
  });
}

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: 53.35, lng: -7.9 }, // Centre of Ireland
    zoom: 7,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true,
    styles: [
      { featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] },
      { featureType: 'transit', stylers: [{ visibility: 'off' }] },
      { featureType: 'landscape', elementType: 'geometry', stylers: [{ color: '#f2ede5' }] },
      { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#ffffff' }] },
      { featureType: 'road.highway', elementType: 'geometry', stylers: [{ color: '#e8ddd0' }] },
      { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#c5d9e8' }] },
    ]
  });
  geocoder = new google.maps.Geocoder();
}

// ── Clear old markers ─────────────────────────────────────────────────────────
function clearMarkers() {
  markers.forEach(m => m.setMap(null));
  markers = [];
  infoWindows.forEach(iw => iw.close());
  infoWindows = [];
}

// ── Geocode one Eircode ───────────────────────────────────────────────────────
function geocodeEircode(eircode) {
  return new Promise((resolve, reject) => {
    // Append Ireland to improve accuracy
    geocoder.geocode({ address: eircode + ', Ireland', region: 'ie' }, (results, status) => {
      if (status === 'OK' && results.length > 0) resolve(results[0].geometry.location);
      else reject(new Error(status));
    });
  });
}

// ── Rate-limited queue ────────────────────────────────────────────────────────
function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Main: Plot ────────────────────────────────────────────────────────────────
runBtn.addEventListener('click', async () => {
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) { toast('Please enter your Google Maps API key.', 'error'); return; }
  if (!csvRows.length) { toast('Please upload a CSV file.', 'error'); return; }

  runBtn.disabled = true;
  progressWrap.style.display = '';
  bizList.innerHTML = '';
  statsEl.style.display = 'none';
  emptyState.style.display = 'none';

  // Load Maps if needed
  try {
    await loadGoogleMaps(apiKey);
    if (!map) initMap();
  } catch (err) {
    alert('Google Maps Error\n\n' + err.message);
    toast('Google Maps failed to load — see alert for details.', 'error');
    runBtn.disabled = false;
    return;
  }

  clearMarkers();

  const eircodeCol = colEircode.value;
  const nameCol    = colName.value;
  const extraCol   = colExtra.value;
  const bounds     = new google.maps.LatLngBounds();

  let ok = 0, fail = 0;

  for (let i = 0; i < csvRows.length; i++) {
    const row = csvRows[i];
    const eircode = (row[eircodeCol] || '').trim();
    const name    = nameCol  ? (row[nameCol]  || eircode) : eircode;
    const extra   = extraCol ? (row[extraCol] || '') : '';

    progressBar.style.width = ((i + 1) / csvRows.length * 100) + '%';
    progressText.textContent = `Geocoding ${i + 1} of ${csvRows.length} — ${name}`;

    // Build sidebar item
    const item = document.createElement('div');
    item.className = 'biz-item';
    item.innerHTML = `<div class="biz-dot" id="dot-${i}"></div>
      <div><div class="biz-name">${escHtml(name)}</div>
      <div class="biz-code">${escHtml(eircode)}</div></div>`;
    bizList.appendChild(item);

    if (!eircode) {
      document.getElementById(`dot-${i}`).classList.add('err');
      fail++;
      continue;
    }

    try {
      const location = await geocodeEircode(eircode);
      bounds.extend(location);

      // Marker
      const marker = new google.maps.Marker({
        position: location,
        map,
        title: name,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 8,
          fillColor: '#c8522a',
          fillOpacity: 0.9,
          strokeColor: '#ffffff',
          strokeWeight: 2,
        }
      });

      // Info window
      const infoContent = `
        <div style="font-family:'DM Sans',sans-serif;padding:6px 4px;min-width:160px">
          <strong style="font-size:0.9rem">${escHtml(name)}</strong><br/>
          <span style="color:#8a8276;font-size:0.8rem">${escHtml(eircode)}</span>
          ${extra ? `<br/><span style="font-size:0.82rem;margin-top:4px;display:block">${escHtml(extra)}</span>` : ''}
        </div>`;
      const iw = new google.maps.InfoWindow({ content: infoContent });
      infoWindows.push(iw);

      marker.addListener('click', () => {
        infoWindows.forEach(w => w.close());
        iw.open(map, marker);
      });

      // Sidebar click
      const idx = markers.length;
      item.addEventListener('click', () => {
        document.querySelectorAll('.biz-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        map.panTo(location);
        map.setZoom(15);
        infoWindows.forEach(w => w.close());
        iw.open(map, markers[idx]);
      });

      markers.push(marker);
      ok++;
    } catch (err) {
      document.getElementById(`dot-${i}`).classList.add('err');
      item.title = `Could not geocode: ${err.message}`;
      fail++;
    }

    // Respect Geocoding API rate limit: ~50 req/s; we add a small delay
    await delay(40);
  }

  // Fit map
  if (!bounds.isEmpty()) map.fitBounds(bounds);

  progressText.textContent = `Done — ${ok} mapped, ${fail} failed`;
  statOk.textContent = ok;
  statFail.textContent = fail;
  statsEl.style.display = 'flex';
  runBtn.disabled = false;

  if (fail > 0 && ok === 0) toast('No Eircodes could be geocoded. Check your API key and column.', 'error');
  else if (fail > 0) toast(`${ok} businesses mapped, ${fail} could not be geocoded.`);
  else toast(`All ${ok} businesses mapped! 🎉`);
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
